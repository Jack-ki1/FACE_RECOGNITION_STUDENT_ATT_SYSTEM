{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="d-flex justify-center align-center" style="min-height: 70vh; padding: var(--spacing-md);">
    <div class="panel" style="width: 100%; max-width: 400px; text-align: center; margin: 0 auto; border-radius: var(--radius-xl); box-shadow: var(--shadow-lg);">
        <div style="margin-bottom: var(--spacing-xl);">
            <div style="width: 80px; height: 80px; margin: 0 auto var(--spacing-lg); display: flex; align-items: center; justify-content: center; background: var(--gradient-primary); border-radius: 50%;">
                <i data-lucide="lock" style="width: 32px; height: 32px; color: white;"></i>
            </div>
            <h2 style="margin-bottom: var(--spacing-sm);">Admin Access</h2>
            <p style="color: var(--text-secondary); margin: 0;">Enter the admin password to continue</p>
        </div>
        
        <form method="POST" style="text-align: left;">
            <div style="margin-bottom: var(--spacing-lg);">
                <label for="password" style="display: block; margin-bottom: var(--spacing-sm); font-weight: 500;">Password</label>
                <input type="password" name="password" id="password" required style="width: 100%; padding: var(--spacing-md); border-radius: var(--radius-lg); border: 1px solid var(--border-primary); background: var(--surface-secondary); color: var(--text-primary);" autocomplete="current-password">
            </div>
            
            <button type="submit" class="btn-primary btn-block" style="height: 3rem; font-size: 1rem; font-weight: 600;">
                <i data-lucide="log-in"></i> Sign In
            </button>
        </form>
        
        <div style="margin-top: var(--spacing-lg); padding-top: var(--spacing-lg); border-top: 1px solid var(--border-primary); color: var(--text-tertiary); font-size: 0.875rem;">
            <p>Secured by encrypted authentication</p>
        </div>
    </div>
</div>
{% endblock %}
