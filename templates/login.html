{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="login-wrap">
    <div class="card-icon"><i data-lucide="lock" style="width:22px;height:22px;"></i></div>
    <h1>Admin Login</h1>
    <p class="subtitle">Enter the admin password to manage students, attendance, and campus settings.</p>

    <form method="POST" class="panel">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autofocus required>
        <button type="submit" class="btn-primary btn-block mt-24">Log In</button>
    </form>

    <p class="text-center" style="margin-top: 18px;">
        <a href="{{ url_for('attendance') }}">← Back to attendance check-in</a>
    </p>
</div>
{% endblock %}
