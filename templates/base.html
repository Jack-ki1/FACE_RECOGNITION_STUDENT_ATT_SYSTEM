<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Face Attendance{% endblock %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script>
        // Immediately apply saved theme to prevent flash of default theme
        (function() {
            const savedTheme = localStorage.getItem('theme');
            const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const initialTheme = savedTheme ? savedTheme : (systemPrefersDark ? 'dark' : 'light');
            document.documentElement.setAttribute('data-theme', initialTheme);
        })();
    </script>
</head>
<body>
    <script>lucide.createIcons();</script>
    <script>
        // Theme toggle functionality
        document.addEventListener('DOMContentLoaded', function() {
            const themeToggle = document.getElementById('theme-toggle');
            
            // Determine the initial theme
            const savedTheme = localStorage.getItem('theme');
            const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const initialTheme = savedTheme ? savedTheme : (systemPrefersDark ? 'dark' : 'light');
            
            // Apply the initial theme (double-check in case script runs after inline script)
            document.documentElement.setAttribute('data-theme', initialTheme);
            updateThemeIcon(initialTheme);
            
            // Add event listener to the toggle button
            themeToggle.addEventListener('click', function() {
                const currentTheme = document.documentElement.getAttribute('data-theme');
                const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
                
                document.documentElement.setAttribute('data-theme', newTheme);
                localStorage.setItem('theme', newTheme);
                updateThemeIcon(newTheme);
            });
            
            // Function to update icon visibility based on theme
            function updateThemeIcon(theme) {
                const sunIcon = themeToggle.querySelector('.sun-icon');
                const moonIcon = themeToggle.querySelector('.moon-icon');
                
                if (theme === 'light') {
                    // Show moon icon when in light theme (means clicking will switch to dark)
                    sunIcon.style.display = 'none';
                    moonIcon.style.display = 'inline';
                } else {
                    // Show sun icon when in dark theme (means clicking will switch to light)
                    sunIcon.style.display = 'inline';
                    moonIcon.style.display = 'none';
                }
            }
        });
        
        // Global loading functions
        function showGlobalLoader() {
            document.getElementById('global-loader').style.display = 'flex';
        }
        
        function hideGlobalLoader() {
            document.getElementById('global-loader').style.display = 'none';
        }
        
        // Add loading effect to navigation links
        document.querySelectorAll('nav a').forEach(link => {
            link.addEventListener('click', function() {
                showGlobalLoader();
            });
        });
    </script>
    <script>lucide.createIcons();</script>
    <script>
        // Theme toggle functionality
        document.addEventListener('DOMContentLoaded', function() {
            const themeToggle = document.getElementById('theme-toggle');
            
            // Determine the initial theme - only apply if not already set by inline script
            let currentTheme = document.documentElement.getAttribute('data-theme');
            if (!currentTheme) {
                const savedTheme = localStorage.getItem('theme');
                const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                currentTheme = savedTheme ? savedTheme : (systemPrefersDark ? 'dark' : 'light');
                document.documentElement.setAttribute('data-theme', currentTheme);
            }
            
            updateThemeIcon(currentTheme);
            
            // Add event listener to the toggle button
            themeToggle.addEventListener('click', function() {
                const currentTheme = document.documentElement.getAttribute('data-theme');
                const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
                
                document.documentElement.setAttribute('data-theme', newTheme);
                localStorage.setItem('theme', newTheme);
                updateThemeIcon(newTheme);
            });
            
            // Function to update icon visibility based on theme
            function updateThemeIcon(theme) {
                const sunIcon = themeToggle.querySelector('.sun-icon');
                const moonIcon = themeToggle.querySelector('.moon-icon');
                
                if (theme === 'light') {
                    // Show moon icon when in light theme (means clicking will switch to dark)
                    sunIcon.style.display = 'none';
                    moonIcon.style.display = 'inline';
                } else {
                    // Show sun icon when in dark theme (means clicking will switch to light)
                    sunIcon.style.display = 'inline';
                    moonIcon.style.display = 'none';
                }
            }
        });
        
        // Global loading functions
        function showGlobalLoader() {
            document.getElementById('global-loader').style.display = 'flex';
        }
        
        function hideGlobalLoader() {
            document.getElementById('global-loader').style.display = 'none';
        }
        
        // Add loading effect to navigation links
        document.querySelectorAll('nav a').forEach(link => {
            link.addEventListener('click', function() {
                showGlobalLoader();
            });
        });
    </script>
       <nav class="navbar">
        <a href="{{ url_for('index') }}" class="brand">
            <span class="brand-icon"><i data-lucide="scan-face" style="width:18px;height:18px;"></i></span>
            Face Attendance
        </a>
        <div class="nav-links">
            <a href="{{ url_for('attendance') }}" class="{{ 'active' if request.endpoint == 'attendance' }}">
                <i data-lucide="camera"></i> Attendance
            </a>
            <a href="{{ url_for('register') }}" class="{{ 'active' if request.endpoint == 'register' }}">
                <i data-lucide="user-plus"></i> Register
            </a>
            <a href="{{ url_for('students') }}" class="{{ 'active' if request.endpoint == 'students' }}">
                <i data-lucide="users"></i> Students
            </a>
            <a href="{{ url_for('dashboard') }}" class="{{ 'active' if request.endpoint == 'dashboard' }}">
                <i data-lucide="layout-dashboard"></i> Dashboard
            </a>
            <a href="{{ url_for('settings') }}" class="{{ 'active' if request.endpoint == 'settings' }}">
                <i data-lucide="map-pin"></i> Campus
            </a>
            {% if auth_enabled %}
                {% if logged_in %}
                    <a href="{{ url_for('logout') }}"><i data-lucide="log-out"></i> Logout</a>
                {% else %}
                    <a href="{{ url_for('login') }}"><i data-lucide="log-in"></i> Login</a>
                {% endif %}
            {% endif %}
            <!-- Theme Toggle Button -->
            <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle theme">
                <i data-lucide="sun" class="theme-icon sun-icon"></i>
                <i data-lucide="moon" class="theme-icon moon-icon"></i>
            </button>
        </div>
    </nav>

    <!-- Global loading indicator -->
    <div id="global-loader" style="display: none;" class="loader-overlay">
        <div class="loader-spinner">
            <i data-lucide="loader" class="loader-icon"></i>
            <p>Loading...</p>
        </div>
    </div>

    <div id="toast-stack"></div>
    <script type="application/json" id="flash-data">
        [{% for category, message in get_flashed_messages(with_categories=true) %}
            {"category": {{ category|tojson }}, "text": {{ message|tojson }}}{{ "," if not loop.last }}
        {% endfor %}]
    </script>

    <main class="container {% block container_class %}{% endblock %}">
        {% block content %}{% endblock %}
    </main>

    <footer class="app-footer">Face Attendance — CNN recognition + campus geofencing</footer>

    <script src="{{ url_for('static', filename='js/toast.js') }}"></script>
    <script src="{{ url_for('static', filename='js/webcam.js') }}"></script>
    {% block scripts %}{% endblock %}
