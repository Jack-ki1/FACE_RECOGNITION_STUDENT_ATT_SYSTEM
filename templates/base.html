<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Face Attendance{% endblock %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body class="{% if request.endpoint != 'login' %}dark-theme{% endif %}">
    <nav class="navbar">
        <a href="{{ url_for('index') }}" class="brand">
            <span class="brand-icon"><i data-lucide="scan-face" style="width:18px;height:18px;"></i></span>
            Face Attendance
        </a>
        <div class="nav-links">
            <a href="{{ url_for('attendance') }}" class="{{ 'active' if request.endpoint == 'attendance' }}">
                <i data-lucide="camera"></i> Attendance
            </a>
            <a href="{{ url_for('register') }}" class="{{ 'active' if request.endpoint == 'register' }}">
                <i data-lucide="user-plus"></i> Register
            </a>
            <a href="{{ url_for('students') }}" class="{{ 'active' if request.endpoint == 'students' }}">
                <i data-lucide="users"></i> Students
            </a>
            <a href="{{ url_for('dashboard') }}" class="{{ 'active' if request.endpoint == 'dashboard' }}">
                <i data-lucide="layout-dashboard"></i> Dashboard
            </a>
            <a href="{{ url_for('settings') }}" class="{{ 'active' if request.endpoint == 'settings' }}">
                <i data-lucide="map-pin"></i> Campus
            </a>
            {% if auth_enabled %}
                {% if logged_in %}
                    <a href="{{ url_for('logout') }}"><i data-lucide="log-out"></i> Logout</a>
                {% else %}
                    <a href="{{ url_for('login') }}"><i data-lucide="log-in"></i> Login</a>
                {% endif %}
            {% endif %}
            <!-- Theme Toggle Button -->
            <button id="theme-toggle" class="btn" onclick="toggleTheme()" title="Toggle theme" style="padding: 8px 10px;">
                <i data-lucide="sun" id="theme-icon"></i>
            </button>
        </div>
    </nav>

    <div id="toast-stack"></div>
    <script type="application/json" id="flash-data">
        [{% for category, message in get_flashed_messages(with_categories=true) %}
            {"category": {{ category|tojson }}, "text": {{ message|tojson }}}{{ "," if not loop.last }}
        {% endfor %}]
    </script>

    <main class="container {% block container_class %}{% endblock %}">
        {% block content %}{% endblock %}
    </main>

    <footer class="app-footer">Face Attendance — CNN recognition + campus geofencing</footer>

    <script src="{{ url_for('static', filename='js/toast.js') }}"></script>
    <script src="{{ url_for('static', filename='js/webcam.js') }}"></script>
    {% block scripts %}{% endblock %}
    <script>
        lucide.createIcons();
        
        // Theme toggle functionality
        function toggleTheme() {
            const body = document.body;
            const themeIcon = document.getElementById('theme-icon');
            
            const isLight = body.classList.contains('light-theme');
            body.classList.toggle('light-theme', !isLight);
            body.classList.toggle('dark-theme', isLight);
            
            const nextTheme = isLight ? 'dark' : 'light';
            localStorage.setItem('theme', nextTheme);
            
            // For light-theme show moon icon; for dark-theme show sun icon.
            themeIcon.setAttribute('data-lucide', isLight ? 'sun' : 'moon');
            lucide.createIcons();
        }

        // Set up the click event for the theme toggle button
        document.getElementById('theme-toggle').addEventListener('click', toggleTheme);

        // Initialize theme based on preference
        document.addEventListener('DOMContentLoaded', function() {
            const savedTheme = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const body = document.body;
            const themeIcon = document.getElementById('theme-icon');
            
            if (savedTheme === 'light') {
                body.classList.add('light-theme');
                themeIcon.setAttribute('data-lucide', 'moon');
            } else if (savedTheme === 'dark') {
                body.classList.add('dark-theme');
                themeIcon.setAttribute('data-lucide', 'sun');
            } else if (prefersDark) {
                body.classList.add('dark-theme');
                themeIcon.setAttribute('data-lucide', 'sun');
            } else {
                // Default to dark theme if no preference is set
                body.classList.add('dark-theme');
                themeIcon.setAttribute('data-lucide', 'sun');
            }
            
            lucide.createIcons(); // Initialize icons
        });
    </script>
</body>
</html>
